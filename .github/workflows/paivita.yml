name: Päivitä lounaat

on:
  # Kolme cron-ajoa eri yöajoilla. GitHub Actionsin cron viivästyy joskus
  # tunteja ruuhka-aikana, varsinkin tasatuntien kohdalla — siksi käytetään
  # parittomia minuutteja ja useampaa ajoa, niin yksi yleensä onnistuu
  # nopeasti. Lounaat.json päivittyy vain kerran (myöhemmät ajot näkevät
  # samat ravintolat ja päivittävät vain aikaleiman).
  # Suomen ajat: kesä = UTC+3, talvi = UTC+2.
  schedule:
    - cron: "37 22 * * *"   # ~01:37 / 00:37 Suomen aikaa
    - cron: "37 0 * * *"    # ~03:37 / 02:37 Suomen aikaa
    - cron: "37 2 * * *"    # ~05:37 / 04:37 Suomen aikaa
  # Voi myös ajaa käsin GitHubin web-käyttöliittymästä
  workflow_dispatch:

permissions:
  contents: write

jobs:
  paivita:
    runs-on: ubuntu-latest
    steps:
      - name: Hae repo
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna Tesseract (OCR Munkkimiesten kuvalle)
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-fin

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf Pillow pytesseract

      - name: Aja scraperit
        run: python scrape.py

      - name: Tallenna muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lounaat.json
          # Commit vain jos jotain muuttui
          git diff --staged --quiet || git commit -m "Päivitä lounaat $(date -u +%Y-%m-%d)"
          git push
