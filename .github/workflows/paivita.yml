name: Päivitä lounaat

on:
  # GitHub Actionsin cron-ajot voivat viivästyä tunteja ruuhka-aikoina,
  # joten aikataulutetaan useampi yritys eri kellonaikoina.
  # Workflow ajaa joka kerta, mutta git commit tehdään vain jos data muuttui,
  # joten päivän aikana useammat ajot ovat halpoja.
  #
  # Cron on UTC-ajassa. Suomen aika = UTC+2 talvella, UTC+3 kesäaikaan.
  schedule:
    - cron: "0 0 * * 1-5"   # 02:00 / 03:00 Suomen aikaa (yöllä, vähän ruuhkaa)
    - cron: "0 4 * * 1-5"   # 06:00 / 07:00 Suomen aikaa
    - cron: "0 5 * * 1-5"   # 07:00 / 08:00 Suomen aikaa
    - cron: "0 6 * * 1-5"   # 08:00 / 09:00 Suomen aikaa
  # Voi myös ajaa käsin GitHubin web-käyttöliittymästä
  workflow_dispatch:

permissions:
  contents: write

jobs:
  paivita:
    runs-on: ubuntu-latest
    steps:
      - name: Hae repo
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Aja scraperit
        run: python scrape.py

      - name: Tallenna muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lounaat.json
          # Commit vain jos jotain muuttui
          git diff --staged --quiet || git commit -m "Päivitä lounaat $(date -u +%Y-%m-%d)"
          git push
