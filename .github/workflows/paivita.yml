name: Päivitä lounaat

on:
  # Yksi cron-ajo arkiyönä klo 02:00 (talviaika) / 03:00 (kesäaika) Suomen aikaa.
  # GitHub ei tue aikavyöhykkeitä cronissa, joten käytetään 00:00 UTC.
  # Yöllä GitHub Actionsin viive on yleensä pieni, joten ajo on tuoreena aamulla.
  schedule:
    - cron: "0 0 * * 1-5"
  # Voi myös ajaa käsin GitHubin web-käyttöliittymästä
  workflow_dispatch:

permissions:
  contents: write

jobs:
  paivita:
    runs-on: ubuntu-latest
    steps:
      - name: Hae repo
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf

      - name: Aja scraperit
        run: python scrape.py

      - name: Tallenna muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lounaat.json
          # Commit vain jos jotain muuttui
          git diff --staged --quiet || git commit -m "Päivitä lounaat $(date -u +%Y-%m-%d)"
          git push
