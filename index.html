<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lähilounaat Tampere</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #faf6ef;
    --bg-card: #ffffff;
    --bg-input: #ffffff;
    --border: #e8e0d0;
    --border-strong: #ddd0b9;
    --text-primary: #2d2a24;
    --text-secondary: #5a5448;
    --text-tertiary: #8a857a;
    --text-muted: #a59f91;
    --accent: #a8553d;
    --accent-bg: #f3e3d4;
    --accent-text: #8c4528;
    --divider: #ede5d5;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    margin: 0;
    padding: 1rem;
    line-height: 1.5;
  }
  header {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    text-align: center;
  }
  header h1 {
    margin: 0 0 0.25rem;
    font-size: 2rem;
    color: var(--text-primary);
    font-weight: 500;
  }
  header p {
    margin: 0;
    color: var(--text-tertiary);
    font-size: 0.9rem;
  }
  #suodatin {
    max-width: 1200px;
    margin: 0 auto 1rem;
    text-align: center;
  }
  #suodatin input {
    padding: 0.55rem 0.85rem;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
    font-size: 1rem;
    background: var(--bg-input);
    color: var(--text-primary);
  }
  #suodatin input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .ravintola {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
  }
  .ravintola h2 {
    margin: 0 0 0.4rem;
    font-size: 1.1rem;
    font-weight: 500;
  }
  .ravintola h2 a {
    color: var(--accent);
    text-decoration: none;
  }
  .ravintola h2 a:hover { text-decoration: underline; }
  .alue {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }
  .paiva {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px dashed var(--divider);
  }
  .paiva:first-of-type {
    border-top: none;
    padding-top: 0;
    margin-top: 0;
  }
  .paiva-otsikko {
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 0.88rem;
    margin-bottom: 0.3rem;
  }
  .paiva-otsikko.tanaan {
    background: var(--accent-bg);
    color: var(--accent-text);
    padding: 3px 10px;
    border-radius: 8px;
    display: inline-block;
  }
  ul.ruoat {
    margin: 0;
    padding-left: 1.2rem;
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--text-primary);
  }
  ul.ruoat li {
    margin-bottom: 0.15rem;
  }
  /* Tulevat (ei tämä päivä) ovat vähän haaleampia */
  .paiva:not(:has(.tanaan)) ul.ruoat {
    color: var(--text-secondary);
  }
  .huom {
    color: var(--text-secondary);
    font-style: italic;
    font-size: 0.9rem;
    margin: 0;
  }
  .virhe {
    color: #b94a48;
    font-size: 0.85rem;
    font-style: italic;
    margin: 0;
  }
  footer {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 0.8rem;
    margin: 2rem 0 1rem;
  }
  footer a {
    color: var(--accent);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
  .piilotettu { display: none !important; }

  /* Tumma tila — haaleampi versio samasta paletista */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f1c19;
      --bg-card: #2c2823;
      --bg-input: #2c2823;
      --border: #3d3833;
      --border-strong: #4a4540;
      --text-primary: #e8e3dc;
      --text-secondary: #b8b0a4;
      --text-tertiary: #8a857a;
      --text-muted: #6f6a60;
      --accent: #d9a487;
      --accent-bg: #4a352a;
      --accent-text: #f3d4bf;
      --divider: #3d3833;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Lähilounaat Tampere</h1>
  <p id="paivitetty">Ladataan...</p>
</header>

<div id="suodatin">
  <input type="text" id="haku" placeholder="Etsi ravintolaa tai ruokalajia...">
</div>

<div class="grid" id="lista">Ladataan lounaslistoja...</div>

<footer>
  Tiedot kerätty automaattisesti ravintoloiden omilta sivuilta.
  Lähteet: <a href="https://lounaat.info" target="_blank">lounaat.info</a> ja ravintoloiden omat sivut.
</footer>

<script>
const PAIVAT = ["maanantai", "tiistai", "keskiviikko", "torstai", "perjantai", "lauantai", "sunnuntai"];

function tanaanIndeksi() {
  const js = new Date().getDay();
  return js === 0 ? 6 : js - 1;
}

function onTanaan(paivaTeksti) {
  if (!paivaTeksti) return false;
  const idx = tanaanIndeksi();
  const teksti = paivaTeksti.toLowerCase();
  const paiva = PAIVAT[idx];
  return teksti.includes(paiva) || teksti.includes(paiva.slice(0, -1));
}

function rendoiPaiva(paiva) {
  const tanaan = onTanaan(paiva.paiva);
  const lk = tanaan ? "paiva-otsikko tanaan" : "paiva-otsikko";
  const ruoat = paiva.ruoat.map(r => `<li>${escapoi(r)}</li>`).join("");
  return `
    <div class="paiva">
      <div class="${lk}">${escapoi(paiva.paiva)}</div>
      <ul class="ruoat">${ruoat}</ul>
    </div>
  `;
}

function escapoi(t) {
  const div = document.createElement("div");
  div.textContent = t;
  return div.innerHTML;
}

function rendoiRavintola(r) {
  let sisalto = "";
  if (r.huom && (!r.paivat || r.paivat.length === 0)) {
    sisalto = `<p class="huom">${escapoi(r.huom)}</p>`;
  } else if (r.virhe) {
    sisalto = `<p class="virhe">⚠️ Listaa ei voitu hakea — avaa ravintolan sivu linkistä.</p>`;
  } else if (!r.paivat || r.paivat.length === 0) {
    sisalto = `<p class="huom">Lounaslistaa ei löytynyt — avaa ravintolan sivu linkistä.</p>`;
  } else {
    const tanaan = r.paivat.filter(p => onTanaan(p.paiva));
    const muut = r.paivat.filter(p => !onTanaan(p.paiva));
    const jarjestetty = [...tanaan, ...muut];
    sisalto = jarjestetty.map(rendoiPaiva).join("");
  }

  return `
    <div class="ravintola" data-haku="${escapoi((r.nimi + " " + (r.paivat || []).map(p => p.ruoat.join(" ")).join(" ")).toLowerCase())}">
      <h2><a href="${escapoi(r.url)}" target="_blank" rel="noopener">${escapoi(r.nimi)}</a></h2>
      <div class="alue">${escapoi(r.alue || "")}</div>
      ${sisalto}
    </div>
  `;
}

function muotoileAika(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    return d.toLocaleString("fi-FI", {
      day: "numeric", month: "numeric", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  } catch (e) { return iso; }
}

async function lataa() {
  try {
    const r = await fetch("lounaat.json?t=" + Date.now());
    if (!r.ok) throw new Error("Ei löytynyt: " + r.status);
    const data = await r.json();

    document.getElementById("paivitetty").textContent =
      "Päivitetty: " + muotoileAika(data.paivitetty);

    const lista = document.getElementById("lista");
    lista.innerHTML = data.ravintolat.map(rendoiRavintola).join("");

    document.getElementById("haku").addEventListener("input", e => {
      const q = e.target.value.toLowerCase().trim();
      document.querySelectorAll(".ravintola").forEach(el => {
        if (!q || el.dataset.haku.includes(q)) {
          el.classList.remove("piilotettu");
        } else {
          el.classList.add("piilotettu");
        }
      });
    });
  } catch (e) {
    document.getElementById("lista").innerHTML =
      `<p style="text-align:center; color:var(--text-tertiary);">Virhe ladattaessa: ${e.message}<br>
      Tämä on normaalia jos GitHub Actions ei ole vielä ajanut ensimmäistä kertaa.</p>`;
  }
}

lataa();
</script>
</body>
</html>
